<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple - Aloqa</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <button><a href="index.html">Home</a></button>
    <main class="contact-container">
        <header class="contact-header">
            <h1>Contact us</h1>
            <p>How can we help you? Please fill out the form below or email us.</p>
        </header>

        <div class="contact-content">
            <div class="contact-info">
                <h2>Contact Information</h2>
                <p><strong>Address:</strong> Toshkent sh., Sayram 14-kvartal, 71-dom</p>
                <p><strong>Phone:</strong> +998 99 000 00 00</p>
                <p><strong>Business Hours:</strong> Monday - Friday, 09:00 - 18:00</p>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@apple.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Enter your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </main>

</body>
</html>
